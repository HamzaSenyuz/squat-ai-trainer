<!DOCTYPE html>
<html>

<head>
    <title>Squat AI Trainer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>

    <div class="container">
        <h1>🏋️ Squat AI Trainer</h1>

        <div class="app-card">

            <div class="video-section">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="stats-section">

                <div id="result" class="status">Ready</div>

                <div class="stat-box">
                    <span>Knee Angle</span>
                    <h2 id="angle">0°</h2>
                </div>

                <div class="stat-box">
                    <span>Reps</span>
                    <h2 id="reps">0</h2>
                </div>

                <div class="stat-box">
                    <span>Form Score</span>

                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>

                    <h2 id="score">0%</h2>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        /* ==============================
           GLOBAL VARIABLES
        ============================== */

        let repCount = 0;
        let squatStage = "UP";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const resultText = document.getElementById("result");
        const repsText = document.getElementById("reps");
        const scoreText = document.getElementById("score");
        const angleText = document.getElementById("angle");
        const progressBar = document.getElementById("progress-bar");


        /* ==============================
           ANGLE CALCULATION
        ============================== */

        function calculateAngle(a, b, c) {
            const radians =
                Math.atan2(c.y - b.y, c.x - b.x) -
                Math.atan2(a.y - b.y, a.x - b.x);

            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180) angle = 360 - angle;

            return angle;
        }


        /* ==============================
           MEDIAPIPE SETUP
        ============================== */

        const pose = new Pose({
            locateFile: (file) =>
                `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 0,
            smoothLandmarks: true,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });


        /* ==============================
           ON RESULTS (AI LOGIC HERE)
        ============================== */


        pose.onResults((results) => {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // VIDEO FRAME'i canvas'a çiz
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (!results.poseLandmarks) return;

            // Skeleton çiz
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS,
                { color: "#00FF00", lineWidth: 3 });

            drawLandmarks(ctx, results.poseLandmarks,
                { color: "#FF0000", lineWidth: 2 });

            const landmarks = results.poseLandmarks;

            const shoulder = landmarks[11];
            const hip = landmarks[23];
            const knee = landmarks[25];
            const ankle = landmarks[27];

            const angle = calculateAngle(hip, knee, ankle);
            angleText.innerText = Math.round(angle) + "°";

            /* REP LOGIC */

            if (angle < 90) {
                squatStage = "DOWN";
            }

            if (angle > 160 && squatStage === "DOWN") {
                squatStage = "UP";
                repCount++;
            }

            repsText.innerText = repCount;

            /* QUALITY ANALYSIS */

            let quality = "Good Form";
            let error = false;

            if (angle > 100 && angle < 140) {
                quality = "Half Squat";
                error = true;
            }

            if (angle <= 80) {
                quality = "Too Deep";
                error = true;
            }

            if (knee.x > ankle.x) {
                quality = "Knee Too Forward";
                error = true;
            }

            const dx = shoulder.x - hip.x;
            const dy = shoulder.y - hip.y;
            const torsoAngle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
            const forwardLean = Math.abs(90 - torsoAngle);

            if (forwardLean > 30) {
                quality = "Too Much Forward Lean";
                error = true;
            }

            resultText.innerText = quality;
            resultText.style.color = error ? "red" : "lime";

            /* SCORE SYSTEM */

            const idealAngle = 90;
            const depthDiff = Math.abs(angle - idealAngle);
            const depthScore = Math.max(0, 100 - depthDiff * 2);

            const kneeScore = knee.x <= ankle.x ? 100 : 50;

            const idealForward = 15;
            const forwardDiff = Math.abs(forwardLean - idealForward);
            const torsoScore = Math.max(0, 100 - forwardDiff * 3);

            const finalScore = Math.round(
                depthScore * 0.5 +
                kneeScore * 0.25 +
                torsoScore * 0.25
            );

            scoreText.innerText = finalScore + "%";
            progressBar.style.width = finalScore + "%";

            if (finalScore < 50) {
                progressBar.style.background = "#ff4d4d";
            } else if (finalScore < 75) {
                progressBar.style.background = "#ffd633";
            } else {
                progressBar.style.background = "#00ff99";
            }
        });




        /* ==============================
           CAMERA START
        ============================== */

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({ image: video });
            },
            width: 640,
            height: 480
        });

        camera.start();

    </script>

</body>

</html>
